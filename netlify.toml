[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[redirects]]
  from   = "/api/*"
  to     = "https://fridgerater-api-production.up.railway.app/api/:splat"
  status = 200
  force  = true

[dev]
  command = "npm run dev"
  port    = 5173
